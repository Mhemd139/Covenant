# Covenant configuration. Commit this alongside covenant.lock.json so `covenant
# check` runs the same way in CI as it does locally.

[server]
# Reach the MCP server over stdio (a launch command) OR http (a url) — set one.
command = "python examples/mcp_server.py"
# url = "http://localhost:8000/mcp"

[baseline]
path = "covenant.lock.json"

# Layer 3: behavioral probes — example calls executed at snapshot/check time to
# fingerprint what tools *actually return*. Only list read-only tools.

[[probes]]
tool = "get_account"
args = { account_id = "acct-001" }

[[probes]]
tool = "get_transactions"
args = { account_id = "acct-001" }
