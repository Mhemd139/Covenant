# Local Postgres for Covenant's Layer 2 contract store.
#   docker compose up -d db
#   DATABASE_URL=postgresql://covenant:covenant@127.0.0.1:5432/covenant
# Reversible: `docker compose down -v` removes the container and its volume.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: covenant
      POSTGRES_PASSWORD: covenant
      POSTGRES_DB: covenant
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U covenant"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pgdata: {}
