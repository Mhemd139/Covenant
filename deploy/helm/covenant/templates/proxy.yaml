{{- if .Values.proxy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-proxy
  labels: { app: covenant-proxy }
spec:
  replicas: 1
  selector:
    matchLabels: { app: covenant-proxy }
  template:
    metadata:
      labels: { app: covenant-proxy }
    spec:
      containers:
        - name: proxy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - proxy
            - --upstream={{ required "proxy.upstream is required" .Values.proxy.upstream }}
            - --baseline=/covenant/{{ .Values.proxy.baselineKey }}
            - --host=0.0.0.0
            - --port={{ .Values.proxy.port }}
          ports:
            - containerPort: {{ .Values.proxy.port }}
          volumeMounts:
            - name: baseline
              mountPath: /covenant
              readOnly: true
      volumes:
        - name: baseline
          configMap:
            name: {{ .Values.proxy.baselineConfigMap }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-proxy
spec:
  selector: { app: covenant-proxy }
  ports:
    - port: {{ .Values.proxy.port }}
      targetPort: {{ .Values.proxy.port }}
{{- end }}
