apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: mcpcontracts.covenant.dev
spec:
  group: covenant.dev
  scope: Namespaced
  names:
    kind: MCPContract
    plural: mcpcontracts
    singular: mcpcontract
    shortNames: [mcpc]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Result
          type: string
          jsonPath: .status.result
        - name: Breaking
          type: integer
          jsonPath: .status.breaking
        - name: Last Check
          type: string
          jsonPath: .status.lastCheckTime
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [server, baselineConfigMap]
              properties:
                server:
                  type: string
                  description: MCP server URL to check (streamable-HTTP).
                baselineConfigMap:
                  type: object
                  required: [name]
                  properties:
                    name: { type: string }
                    key: { type: string, default: covenant.lock.json }
                intervalSeconds:
                  type: integer
                  default: 300
                  minimum: 30
                proxyRefreshUrl:
                  type: string
                  description: Optional Covenant proxy /covenant/refresh URL to nudge after each check.
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
